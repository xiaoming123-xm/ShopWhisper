version: '3.8'

# 开发环境覆盖配置
services:
  nginx:
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d.dev:/etc/nginx/conf.d:ro
      - nginx_logs:/var/log/nginx
    ports:
      - "80:80"
      # 开发环境不需要443端口

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NODE_ENV=development
        - NEXT_PUBLIC_API_BASE_URL=/api/v1
        - NEXT_PUBLIC_WS_BASE_URL=ws://127.0.0.1/api/v1/ws
    env_file:
      - frontend/.env.development

  api:
    env_file:
      - .env.development
      - backend/.env.development
    environment:
      DEPLOY_ENV: development
      DEBUG: "true"
      DATABASE_URL: postgresql+asyncpg://ecom_user:ecom_password@postgres:5432/shop_whisper
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      POSTGRES_HOST: postgres
      POSTGRES_USER: ecom_user
      POSTGRES_PASSWORD: ecom_password
      POSTGRES_DB: shop_whisper
      RUN_INIT_DB: "false"

  db-init:
    env_file:
      - .env.development
      - backend/.env.development
    environment:
      DEPLOY_ENV: development
      DATABASE_URL: postgresql+asyncpg://ecom_user:ecom_password@postgres:5432/shop_whisper
      REDIS_URL: redis://redis:6379/0
      POSTGRES_HOST: postgres
      POSTGRES_USER: ecom_user
      POSTGRES_PASSWORD: ecom_password
      POSTGRES_DB: shop_whisper
      RUN_INIT_DB: "true"

  celery-worker:
    env_file:
      - .env.development
      - backend/.env.development
    environment:
      DEPLOY_ENV: development
      DATABASE_URL: postgresql+asyncpg://ecom_user:ecom_password@postgres:5432/shop_whisper
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      POSTGRES_HOST: postgres
      POSTGRES_USER: ecom_user
      POSTGRES_PASSWORD: ecom_password
      POSTGRES_DB: shop_whisper
      RUN_INIT_DB: "false"
