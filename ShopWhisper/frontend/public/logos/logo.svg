<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景圆形 -->
  <circle cx="100" cy="100" r="95" fill="url(#mainGradient)" opacity="0.1"/>

  <!-- 主聊天气泡（左侧，代表客户） -->
  <path d="M 50 70 Q 50 50 70 50 L 110 50 Q 130 50 130 70 L 130 90 Q 130 110 110 110 L 80 110 L 65 125 L 65 110 L 70 110 Q 50 110 50 90 Z"
        fill="url(#mainGradient)" opacity="0.8"/>

  <!-- AI 聊天气泡（右侧，代表 AI 客服） -->
  <path d="M 150 90 Q 150 70 170 70 L 210 70 Q 230 70 230 90 L 230 110 Q 230 130 210 130 L 180 130 L 165 145 L 165 130 L 170 130 Q 150 130 150 110 Z"
        fill="url(#accentGradient)"/>

  <!-- AI 大脑图标（在右侧气泡内） -->
  <g transform="translate(175, 85)">
    <!-- 大脑轮廓 -->
    <path d="M 10 5 Q 15 0 20 5 Q 25 0 30 5 L 30 15 Q 30 20 25 20 L 15 20 Q 10 20 10 15 Z"
          fill="white" opacity="0.9"/>
    <!-- 神经网络线条 -->
    <line x1="15" y1="8" x2="25" y2="8" stroke="url(#accentGradient)" stroke-width="1.5"/>
    <line x1="15" y1="12" x2="25" y2="12" stroke="url(#accentGradient)" stroke-width="1.5"/>
    <line x1="15" y1="16" x2="25" y2="16" stroke="url(#accentGradient)" stroke-width="1.5"/>
    <!-- 连接点 -->
    <circle cx="15" cy="8" r="1.5" fill="url(#accentGradient)"/>
    <circle cx="20" cy="12" r="1.5" fill="url(#accentGradient)"/>
    <circle cx="25" cy="16" r="1.5" fill="url(#accentGradient)"/>
  </g>

  <!-- 购物车图标（左下角，代表电商） -->
  <g transform="translate(60, 140)">
    <rect x="0" y="5" width="25" height="20" rx="2" fill="url(#mainGradient)" opacity="0.8"/>
    <circle cx="7" cy="30" r="3" fill="url(#mainGradient)"/>
    <circle cx="18" cy="30" r="3" fill="url(#mainGradient)"/>
    <path d="M -5 0 L 0 5 L 25 5" stroke="url(#mainGradient)" stroke-width="2" fill="none"/>
  </g>

  <!-- 闪电图标（代表智能/快速） -->
  <g transform="translate(85, 75)">
    <path d="M 5 0 L 0 10 L 5 10 L 3 18 L 12 8 L 7 8 L 9 0 Z"
          fill="#fbbf24" opacity="0.9"/>
  </g>

  <!-- 文字标识 -->
  <text x="100" y="175" font-family="Arial, sans-serif" font-size="18" font-weight="bold"
        text-anchor="middle" fill="url(#mainGradient)">
    ShopWhisper
  </text>

  <text x="100" y="190" font-family="Arial, sans-serif" font-size="10"
        text-anchor="middle" fill="#6b7280">
    AI Customer Service
  </text>
</svg>
