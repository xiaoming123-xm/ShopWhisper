services:
  postgres:
    image: postgres:14-alpine
    container_name: shopwhisper-postgres
    environment:
      POSTGRES_USER: ecom_user
      POSTGRES_PASSWORD: ecom_password
      POSTGRES_DB: shop_whisper
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecom_user -d shop_whisper"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecom-network

  redis:
    image: redis:7-alpine
    container_name: shopwhisper-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - ecom-network

  db-init:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shopwhisper-db-init
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DEPLOY_ENV: production
      DATABASE_URL: postgresql+asyncpg://ecom_user:ecom_password@postgres:5432/shop_whisper
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-shopwhisper-change-me-in-production}
      POSTGRES_HOST: postgres
      POSTGRES_USER: ecom_user
      POSTGRES_PASSWORD: ecom_password
      POSTGRES_DB: shop_whisper
      RUN_INIT_DB: "false"
      LLM_PROVIDER: deepseek
      LLM_MODEL: deepseek-chat
      DEEPSEEK_API_BASE: https://api.deepseek.com
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-sk-ee9e9d9ee2644806a196c01de7195587}
      EMBEDDING_PROVIDER: local
      EMBEDDING_MODEL: local-hash-embedding
      EMBEDDING_DIMENSION: 384
    command: python init_db.py
    networks:
      - ecom-network
    restart: "no"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shopwhisper-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    environment:
      DEPLOY_ENV: production
      DATABASE_URL: postgresql+asyncpg://ecom_user:ecom_password@postgres:5432/shop_whisper
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      JWT_SECRET: ${JWT_SECRET:-shopwhisper-change-me-in-production}
      POSTGRES_HOST: postgres
      POSTGRES_USER: ecom_user
      POSTGRES_PASSWORD: ecom_password
      POSTGRES_DB: shop_whisper
      RUN_INIT_DB: "true"
      LLM_PROVIDER: deepseek
      LLM_MODEL: deepseek-chat
      DEEPSEEK_API_BASE: https://api.deepseek.com
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-sk-ee9e9d9ee2644806a196c01de7195587}
      EMBEDDING_PROVIDER: local
      EMBEDDING_MODEL: local-hash-embedding
      EMBEDDING_DIMENSION: 384
    volumes:
      - ./photo:/app/photo
    ports:
      - "8000:8000"
    networks:
      - ecom-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: /api/v1
        NEXT_PUBLIC_WS_BASE_URL: /api/v1/ws
    container_name: shopwhisper-frontend
    depends_on:
      - api
    networks:
      - ecom-network
    restart: unless-stopped

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shopwhisper-celery-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    environment:
      DEPLOY_ENV: production
      DATABASE_URL: postgresql+asyncpg://ecom_user:ecom_password@postgres:5432/shop_whisper
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      JWT_SECRET: ${JWT_SECRET:-shopwhisper-change-me-in-production}
      POSTGRES_HOST: postgres
      POSTGRES_USER: ecom_user
      POSTGRES_PASSWORD: ecom_password
      POSTGRES_DB: shop_whisper
      RUN_INIT_DB: "false"
      LLM_PROVIDER: deepseek
      LLM_MODEL: deepseek-chat
      DEEPSEEK_API_BASE: https://api.deepseek.com
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-sk-ee9e9d9ee2644806a196c01de7195587}
      EMBEDDING_PROVIDER: local
      EMBEDDING_MODEL: local-hash-embedding
      EMBEDDING_DIMENSION: 384
    volumes:
      - ./photo:/app/photo
    command: celery -A tasks.celery_app worker --loglevel=info --concurrency=2 -Q default,notifications,data_processing,billing,webhooks
    networks:
      - ecom-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: shopwhisper-nginx
    depends_on:
      - api
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d.dev:/etc/nginx/conf.d:ro
      - ./photo:/usr/share/nginx/html/photo:ro
      - nginx_logs:/var/log/nginx
    networks:
      - ecom-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  nginx_logs:

networks:
  ecom-network:
    driver: bridge
